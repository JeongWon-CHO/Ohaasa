name: Crawl horoscopes and save

on:
  schedule:
    - cron: "59 20 * * *" # UTC 기준. JST/KST 매일 05:59 실행.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run 모드 (DB 쓰기 없음, 푸시 발송 없음)"
        type: boolean
        default: false
      force:
        description: "날짜 체크 무시하고 강제 크롤링"
        type: boolean
        default: false

# 수동 실행과 cron이 겹쳐 중복 발송되는 것을 방지한다.
# cancel-in-progress: false — 실행 중인 job은 취소하지 않고 직렬 대기한다.
concurrency:
  group: ohaasa-crawl-and-notify
  cancel-in-progress: false

# 이 workflow는 checkout만 필요하다.
permissions:
  contents: read

jobs:
  crawl-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 70 # 초기 실행 (~8분) + 재시도 최대 2회 × 20분 대기 + 여유

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Crawl and save
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          MAX_RETRIES=2
          RETRY=0
          while true; do
            npx tsx src/main.ts $ARGS
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "[workflow] Crawl succeeded."
              break
            elif [ $EXIT_CODE -eq 2 ] && [ $RETRY -lt $MAX_RETRIES ]; then
              RETRY=$((RETRY + 1))
              echo "[workflow] No fresh data. Retry $RETRY/$MAX_RETRIES in 20 minutes..."
              sleep 1200
            else
              echo "[workflow] Crawl failed or max retries reached (exit=$EXIT_CODE, retry=$RETRY)."
              exit $EXIT_CODE
            fi
          done
