// Tiny constellation SVG for Alt B
const MiniConstellation = ({ id, color = T.yellow, size = 80 }) => {
  const pts = CONST_LINES[id] || [];
  if (pts.length < 2) return null;
  const lines = [];
  for (let i = 0; i < pts.length - 1; i++) {
    lines.push(
      <line key={i}
        x1={pts[i][0]} y1={pts[i][1]}
        x2={pts[i+1][0]} y2={pts[i+1][1]}
        stroke={color} strokeWidth="1.5" strokeOpacity="0.5"
        strokeLinecap="round"
      />
    );
  }
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{ position: 'absolute', inset: 0, opacity: 0.6 }}>
      {lines}
      {pts.map(([cx, cy], i) => (

      {/* Screen flow */}

        {[
          ['F1','FinalOnboarding','최초 실행 — 앱 소개 → 시작하기'],
          ['F2','FinalSignSelection','별자리 선택 — 3열 그리드 → 시작'],
          ['F3','FinalMainRevised','오늘의 운세 — 탭: 오늘 (확정)'],
          ['F4','FinalAllRankings','전체 순위 — 탭: 전체'],
          ['F5','FinalSettings','설정 — 탭: 설정'],
        ].map(([code, name, desc]) => (
          <div key={code} style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'rgba(255,253,249,0.85)', borderRadius: 12, padding: '10px 14px', border: FBORDER }}>
            <div style={{ width: 24, height: 24, borderRadius: 8, background: code === 'F3' ? T.apricotDark : T.textMid, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <span style={{ fontSize: 9, fontWeight: 700, color: T.white }}>{code}</span>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: T.text }}>{name}</div>
                {code === 'F3' && <div style={{ fontSize: 9, fontWeight: 700, color: T.apricotDark, background: 'rgba(240,184,154,0.25)', borderRadius: 6, padding: '2px 7px', letterSpacing: '0.05em' }}>확정</div>}
              </div>
              <div style={{ fontSize: 10, color: T.textSoft }}>{desc}</div>
            </div>
          </div>
        ))}
      </div>

      {/* F3 Layout Note */}
      <div style={{ fontSize: 10, color: T.textSoft, letterSpacing: '0.18em', marginBottom: 10 }}>F3 레이아웃 구조 (핸드오프)</div>
      <div style={{ background: 'rgba(255,253,249,0.85)', borderRadius: 16, padding: '14px 16px', border: FBORDER }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: T.apricotDark, marginBottom: 10 }}>오늘의 운세 화면 — 레이아웃 스펙</div>
        {[
          ['화면 구조', 'flex column, height: 100%, overflow: hidden'],
          ['본문 영역', 'flex: 1, overflowY: auto — 스크롤 가능'],
          ['하단 탭바', '본문 영역 밖, 화면 하단에 고정 (safe area 근처)'],
          ['탭바 아래 여백', '없음 — 탭바가 화면 가장 하단에 붙음'],
          ['탭바 높이', '약 58px (padding 12px top / 8px bottom)'],
          ['콘텐츠 순서', '헤더 → 방송일 pill → 별자리 Hero → 운세 카드 → 행운/운 그리드'],
          ['배경', 'FBG gradient (FAF6F0 → F5EBD8 → EDD9C4 → EAD5CE)'],
          ['카드 스타일', 'FCARD — white 75%, border-radius 20, soft shadow'],
        ].map(([label, val]) => (
          <div key={label} style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'flex-start' }}>
            <div style={{ fontSize: 10, color: T.textSoft, minWidth: 80, flexShrink: 0, paddingTop: 1 }}>{label}</div>
            <div style={{ fontSize: 10, color: T.text, lineHeight: 1.5 }}>{val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
